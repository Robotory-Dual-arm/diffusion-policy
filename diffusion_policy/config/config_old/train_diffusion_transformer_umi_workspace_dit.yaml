defaults:
  - _self_
  - task: umi_bimanual

name: train_diffusion_transformer_timm_dit
_target_: diffusion_policy.workspace.train_diffusion_transformer_timm_workspace.TrainDiffusionTransformerTimmWorkspace

horizon: 16
n_obs_steps: 2
dataset_obs_steps: ${n_obs_steps}

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

n_action_steps: 6
n_emb: 256

policy:
  _target_: diffusion_policy.policy.diffusion_transformer_timm_dit_policy.DiffusionTransformerTimmDiTPolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: v_prediction

  obs_encoder:
    _target_: diffusion_policy.model.vision.transformer_obs_encoder.TransformerObsEncoder
    shape_meta: ${shape_meta}
    global_pool: ''
    n_emb: ${n_emb}

    model_name: 'resnet34.a1_in1k'
    pretrained: False
    frozen: False
    pretrained_model_norm: True

    feature_aggregation: attention_pool_2d
    downsample_ratio: 32

    transforms:
      - type: RandomCrop
        ratio: 0.95

      - _target_: torchvision.transforms.ColorJitter
        brightness: 0.1
        contrast: 0.15
        saturation: 0.2
        hue: 0.03

    use_group_norm: True
    share_rgb_model: True

  num_inference_steps: 16
  input_pertub: 0.1
  n_layer: 7
  n_cond_layers: 0
  n_head: 8
  n_emb: ${n_emb}
  p_drop_emb: 0.0
  p_drop_attn: 0.1
  causal_attn: False
  time_as_cond: True
  obs_as_cond: True

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 24
  num_workers: 16
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 24
  num_workers: 16
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  lr: 0.5e-4
  weight_decay: 1.0e-6
  obs_encoder_lr: 0.5e-4
  obs_encoder_weight_decay: 1.0e-6
  betas: [0.95, 0.999]

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: False
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 1000
  gradient_accumulate_every: 1
  use_ema: True
  freeze_encoder: False
  rollout_every: 100
  checkpoint_every: 100
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

logging:
  project: diffusion_policy_debug
  resume: False
  mode: online
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 20
    format_str: 'epoch={epoch:04d}-train_loss={train_loss:.3f}.ckpt'
  save_last_ckpt: True
  save_last_snapshot: False

multi_run:
  run_dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: /data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}

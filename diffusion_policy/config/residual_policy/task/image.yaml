# @package task
name: image

# Fill these two paths for a concrete run.
dataset_path: data/baetae/260519/fast_residual_from_slow.hdf5
slow_ckpt_path: data/outputs/path/to/slow/checkpoints/latest.ckpt

image_shape: [3, 224, 224]
low_dim_obs_horizon: 2
img_obs_horizon: 2
action_horizon: 1

shape_meta: &shape_meta
  obs:
    image0:
      shape: [3, 224, 224]
      type: rgb
      horizon: ${task.img_obs_horizon}

    robot_pose_R:
      shape: [3]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}

    robot_quat_R:
      shape: [4]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}
      rotation_rep: rotation_6d

    wrench_wrist_R:
      shape: [6, 32]
      type: wrench

    actual_action_rel:
      shape: [9]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}

  action:
    shape: [6] # dpos(3) + drotvec(3), slow_abs -> virtual_abs
    horizon: ${task.action_horizon}

pose_repr: &pose_repr
  obs_pose_repr: abs
  action_pose_repr: residual_delta6

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.residual_policy.dataset.FastResidualReplayImageDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  horizon: ${dataset_horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  slow_action_key: actual_action_rel
  # actions: residual_delta6_slow_pred_to_virtual generated by create_fast_residual_dataset.py
  # obs/residual_delta6_gt_actual_to_virtual: residual from GT actual to virtual in the slow dataset
  action_key: actions
  use_cache: False
  seed: 42
  val_ratio: 0.03
  pose_repr: *pose_repr

# @package task
name: slow_actual

dataset_path: data/baetae/260618/slow_erase_board_virtual_m.hdf5
slow_ckpt_path: data/outputs/2026.06.18/slow/slow.ckpt

image_shape: [3, 224, 224]
low_dim_obs_horizon: 1
img_obs_horizon: 1
action_horizon: 1

shape_meta: &shape_meta
  obs:
    image0:
      shape: [3, 224, 224]
      type: rgb
      horizon: ${task.img_obs_horizon}

    robot_pose_R:
      shape: [3]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}

    robot_quat_R:
      shape: [4]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}
      rotation_rep: rotation_6d

    wrench_wrist_R:
      shape: [6, 32]
      type: wrench

    base_action_rel:
      shape: [9]
      type: low_dim
      horizon: ${task.low_dim_obs_horizon}

  action:
    shape: [6]
    horizon: ${task.action_horizon}

pose_repr: &pose_repr
  obs_pose_repr: abs
  action_pose_repr: residual_delta6

env_runner:
  _target_: diffusion_policy.env_runner.real_pusht_image_runner.RealPushTImageRunner

dataset:
  _target_: diffusion_policy.residual_policy.step_dataset.FastResidualStepDataset
  shape_meta: *shape_meta
  dataset_path: ${task.dataset_path}
  base_action_key: base_action_rel
  # For the first GT-residual experiment, use actual[t] -> actual[t+1].
  # For a slow-predicted residual dataset, change this to obs/slow_action_rel or another stored key.
  base_action_source_key: obs/actual_action_rel
  # GT target: actual[t+1] -> virtual[t+1].
  action_key: obs/residual_delta6_gt_actual_to_virtual
  n_obs_steps: ${dataset_obs_steps}
  use_cache: False
  seed: 42
  val_ratio: 0.03
  pose_repr: *pose_repr
